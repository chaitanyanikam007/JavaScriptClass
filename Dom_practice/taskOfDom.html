<!DOCTYPE html>
<html>
<head>
  <title>DOM Practice</title>
  <style>
    #box {
      width: 200px;
      height: 100px;
      background-color: lightblue;
      text-align: center;
      line-height: 100px;
      margin: 20px;
    }
  </style>
</head>
<body>

  <h1 id="main-heading">Hello DOM!</h1>

  <div id="box">I'm a box</div>
   <!-- <button id= 'hide'> hide a box</button> -->
  <input type="text" id="inputField" placeholder="Enter new heading">
  <button id="changeTextBtn">Change Heading</button>

  <button id="changeColorBtn">Change Box Color</button>

  <script>
    //adding button in this page using dom element
      const get = document.querySelector('body');
      const button = document.createElement('button');
      button.innerText='hide box button';
      button.id= 'hide';
      get.appendChild(button);
      button.addEventListener('click',(e)=>{
        //console.log(e);
      const box = document.querySelector('#box');
      //  console.log(box);

        if (box.style.display=== 'none'){
          box.style.display = 'block';
          button.innerText='hide box button';
          
        }
        else {
          button.innerText='show box button';
          box.style.display='none';
        }
      });

    // 1. Change heading text when button is clicked
    document.getElementById("changeTextBtn").addEventListener("click", function() {
      let userInput = document.getElementById("inputField").value;
      document.getElementById("main-heading").innerText = userInput;
      const heading = document.querySelector('#main-heading');
      heading.style.fontSize ='40px';
    });

    // 2. Change box color on button click
    document.getElementById("changeColorBtn").addEventListener("click", function() {
      document.getElementById("box").style.backgroundColor = "orange";
      
    });
      const btn =document.createElement('button');
      btn.innerText='carrying blue color';
      button.id ='blue';
      get.appendChild(btn);
      btn.addEventListener('click', ()=>{
        document.querySelector('#box').style.backgroundColor ='lightblue';
      });
  </script>

</body>
</html>
